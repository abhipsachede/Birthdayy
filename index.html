<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
overflow:hidden;
background: linear-gradient(135deg,#fbe7ff,#d7f5ff,#fff3d6);
display:flex;
justify-content:center;
align-items:center;
}

/* soft floating glow */
body::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:#ff9edb;
filter:blur(120px);
top:10%;
left:10%;
opacity:0.4;
}

body::after{
content:"";
position:absolute;
width:300px;
height:300px;
background:#8fd3ff;
filter:blur(120px);
bottom:10%;
right:10%;
opacity:0.4;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transform:scale(0.98);
transition:0.8s ease;
pointer-events:none;
}

.screen.active{
opacity:1;
transform:scale(1);
pointer-events:auto;
}

.card{
background:rgba(255,255,255,0.35);
backdrop-filter: blur(20px);
padding:45px;
border-radius:28px;
text-align:center;
width:90%;
max-width:420px;
box-shadow:0 20px 60px rgba(0,0,0,0.08);
}

h1{
font-size:26px;
font-weight:600;
color:#222;
}

p{
margin-top:12px;
font-size:14px;
color:#555;
line-height:1.6;
}

button{
margin-top:20px;
padding:12px 26px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#ff7ac6,#7cc7ff);
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
}

.fade{
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* subtle floating dots */
.dot{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.5;
animation:float 6s infinite linear;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
<div class="card fade">
<h1>✨ A Small Surprise Awaits</h1>
<p>Tap below to begin the experience</p>
<button onclick="next()">Start ✨</button>
</div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
<div class="card fade">
<h1>🎂 Make a Wish</h1>
<p>Press & hold for 3 seconds to continue</p>
<button onmousedown="hold()">Hold 🎈</button>
</div>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
<div class="card fade">
<h1>🎉 Happy Birthday Shriyash</h1>
<p id="msg"></p>
</div>
</div>

<script>

function next(){
switchScreen("s1","s2");
}

function hold(){
setTimeout(()=>{
switchScreen("s2","s3");
document.getElementById("msg").innerText =
`May your life always stay soft, peaceful & full of growth ✨

Mla purn vishwas ahe tu sagla achieve karshil 💖

Jari distance asla tari belief kadhi kami honar nahi 🌸`;
},3000);
}

function switchScreen(a,b){
document.getElementById(a).classList.remove("active");
document.getElementById(b).classList.add("active");
}

/* floating background dots */
for(let i=0;i<20;i++){
let d=document.createElement("div");
d.className="dot";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(d);
}

</script>

</body>
</html>
