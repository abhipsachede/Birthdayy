<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Surprise ✨</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background: linear-gradient(135deg,#ffd6e0,#c9f0ff);
display:flex;
justify-content:center;
align-items:center;
}

/* smooth card */
.card{
text-align:center;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.25);
backdrop-filter: blur(12px);
box-shadow:0 10px 40px rgba(0,0,0,0.1);
width:90%;
max-width:420px;
}

/* button */
button{
padding:12px 25px;
border:none;
border-radius:20px;
background:#ff6fa5;
color:white;
font-size:18px;
cursor:pointer;
margin-top:15px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* hidden screens */
.screen{
display:none;
}

.active{
display:block;
}

/* confetti */
.confetti{
position:absolute;
width:8px;
height:8px;
background:red;
top:-10px;
animation: fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

h1{
color:#ff3f8b;
}

p{
margin-top:10px;
color:#333;
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div class="card screen active" id="s1">
<h1>✨ Tap Here ✨</h1>
<button onclick="next()">Start</button>
</div>

<!-- SCREEN 2 -->
<div class="card screen" id="s2">
<h1>🎂 Make a Wish</h1>
<p>Hold the button for 3 seconds</p>
<button onmousedown="hold()" onmouseup="blow()">🎈 Hold</button>
</div>

<!-- SCREEN 3 -->
<div class="card screen" id="s3">
<h1>🎉 Happiest Birthday Shriyash 🎉</h1>
<p id="msg"></p>
</div>

<script>

function next(){
document.getElementById("s1").classList.remove("active");
document.getElementById("s2").classList.add("active");
}

function hold(){
setTimeout(blow,3000);
}

function blow(){
document.getElementById("s2").classList.remove("active");
document.getElementById("s3").classList.add("active");

document.getElementById("msg").innerText =
`May your life be full of happiness, love and success ✨
Mla purn vishwas ahe tu sagla achieve karshil 💖`;

for(let i=0;i<60;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["#ff4d6d","#ffd166","#06d6a0","#4dabf7"][Math.floor(Math.random()*4)];
document.body.appendChild(c);
}
}

</script>

</body>
</html>
